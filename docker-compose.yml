services:

  postgres:
    image: postgres:16
    container_name: omniflow-postgres
    environment:
      POSTGRES_USER: omniflow
      POSTGRES_PASSWORD: omniflow
      POSTGRES_DB: omniflow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: omniflow-redis
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3-management
    container_name: omniflow-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"

volumes:
  postgres_data: